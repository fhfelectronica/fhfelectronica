<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FHF Electronica</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>FHF Electronica</h1>
      <p>Catalogo de productos</p>
    </div>
    <div class="searchbar">
      <button id="mobileCategoriesButton" type="button">Categorias</button>
      <input id="searchInput" type="search" placeholder="Buscar por SKU, nombre o caracteristica">
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <div class="sidebar-title">Categorias</div>
      <nav id="desktopCategories" class="category-menu"></nav>
    </aside>

    <section class="catalog">
      <div class="catalog-toolbar">
        <div>
          <div id="activeCategoryLabel" class="active-category">Todas las categorias</div>
          <span id="countLabel"></span>
        </div>
        <button id="clearFiltersButton" type="button">Limpiar</button>
      </div>
      <section id="productsGrid" class="products"></section>
    </section>
  </main>

  <div id="mobileOverlay" class="mobile-overlay" hidden></div>
  <aside id="mobileCategoriesPanel" class="mobile-panel" hidden>
    <div class="mobile-panel-header">
      <strong>Categorias</strong>
      <button id="closeMobileCategoriesButton" type="button">Cerrar</button>
    </div>
    <nav id="mobileCategories" class="mobile-categories"></nav>
  </aside>

  <template id="productTemplate">
    <article class="product">
      <div class="product-image"></div>
      <div class="product-body">
        <div class="sku"></div>
        <h2></h2>
        <p class="description"></p>
        <div class="price"></div>
        <dl class="attributes"></dl>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
