<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FHF Electronica</title>
  <link rel="icon" href="assets/fhf-electronica-icon.jpg" type="image/jpeg">
  <link rel="stylesheet" href="styles.css?v=1783294117">
</head>
<body>
  <div class="signal"></div>
  <header class="topbar">
    <div class="business-strip">
      <div class="business-copy">Distribución de componentes electrónicos e importación a pedido para desarrollos, mantenimiento e industria.</div>
      <div class="business-info">
        <span class="business-location">Argentina</span>
        <div id="contactLinks" class="contact-links"></div>
      </div>
    </div>
    <div class="header-main">
      <div class="brand">
        <img class="brand-logo" src="assets/fhf-electronica-logo.png" alt="FHF Electronica">
      </div>
      <div id="mobileContactLinks" class="mobile-contact-links"></div>
      <div class="searchbar">
        <button id="mobileCategoriesButton" type="button">Categorías</button>
        <span class="search-scope">Todos los productos</span>
        <input id="searchInput" type="search" placeholder="Buscar por nombre, código o característica técnica" aria-label="Buscar productos">
        <span class="search-icon" aria-hidden="true">⌕</span>
      </div>
      <div class="topbar-actions">
        <a id="contactButton" class="contact-button" hidden>Contacto</a>
        <button id="cartButton" class="cart-button" type="button" hidden>
          Cotización · <span id="cartCount" class="cart-count">0</span>
        </button>
      </div>
    </div>
  </header>

  <main class="layout">
    <aside class="side-panel">
      <section class="sidebar">
        <div class="sidebar-title">Categorías</div>
        <nav id="desktopCategories" class="category-menu"></nav>
      </section>
    </aside>

    <section class="catalog">
      <div class="catalog-toolbar">
        <div id="activeCategoryLabel" class="active-category">Todos</div>
        <span id="countLabel"></span>
      </div>
      <section id="productsGrid" class="products"></section>
      <nav id="pagination" class="pagination" aria-label="Páginas de productos" hidden>
        <button id="previousPageButton" type="button">Anterior</button>
        <span id="pageLabel"></span>
        <button id="nextPageButton" type="button">Siguiente</button>
      </nav>
    </section>
  </main>

  <div id="mobileOverlay" class="mobile-overlay" hidden></div>
  <aside id="mobileCategoriesPanel" class="mobile-panel" hidden>
    <div class="mobile-panel-header">
      <strong>Categorías</strong>
      <button id="closeMobileCategoriesButton" type="button">Cerrar</button>
    </div>
    <nav id="mobileCategories" class="mobile-categories"></nav>
  </aside>

  <template id="productTemplate">
    <article class="product">
      <span class="product-tag" hidden>Disponible</span>
      <div class="product-image"></div>
      <div class="product-body">
        <h2></h2>
        <p class="description"></p>
        <div class="price"></div>
        <dl class="attributes"></dl>
        <div class="order-controls">
          <span class="sku"></span>
          <label><span class="quantity-label">Cantidad</span><input class="quantity-input" type="number" min="1" max="999999" value="1" aria-label="Cantidad"></label>
          <button class="add-to-order" type="button">Agregar</button>
        </div>
      </div>
    </article>
  </template>

  <dialog id="orderDialog" class="order-dialog">
    <form id="orderForm" method="dialog">
      <div class="dialog-header">
        <div>
          <h2>Solicitar cotización</h2>
          <p>Revisa los productos y las cantidades. Completa al menos un dato para que podamos responderte.</p>
        </div>
        <button id="closeOrderButton" class="close-dialog" type="button" aria-label="Cerrar">Cerrar</button>
      </div>
      <div id="orderItems" class="order-items"></div>
      <div class="customer-fields">
        <label>Nombre o razon social<input id="customerName" maxlength="160"></label>
        <label>WhatsApp o telefono<input id="customerPhone" maxlength="80"></label>
        <label>Correo<input id="customerEmail" type="email" maxlength="160"></label>
        <label>CUIT o identificacion<input id="customerTaxId" maxlength="80"></label>
        <label>Localidad<input id="customerLocation" maxlength="160"></label>
        <label class="full-field">Observaciones<textarea id="customerNotes" maxlength="2000" rows="3"></textarea></label>
      </div>
      <div id="turnstileContainer"></div>
      <div id="orderMessage" class="order-message" role="status"></div>
      <div class="dialog-actions">
        <button id="submitOrderButton" class="submit-order" type="submit">Solicitar cotización</button>
      </div>
    </form>
  </dialog>

  <script src="app.js?v=1783294117"></script>
</body>
</html>
